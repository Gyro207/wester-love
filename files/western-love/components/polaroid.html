<!--
  polaroid.html — Plantilla de foto polaroid
  Este componente es una referencia visual.
  Las polaroids reales se generan dinámicamente desde js/sections.js
  usando los datos de CONFIG.fotos en js/config.js

  Estructura que genera el JS:
  ─────────────────────────────
  <div class="polaroid" style="--rot: Xdeg">
    <div class="polaroid-foto">🌅</div>
    <p class="polaroid-nota">Nuestro primer amanecer</p>
    <p class="polaroid-fecha">Marzo, 1899</p>
  </div>

  Para agregar fotos reales (imágenes):
  ─────────────────────────────────────
  Reemplazá el emoji dentro de .polaroid-foto por una etiqueta <img>:
  <img src="assets/fotos/foto1.jpg" alt="descripción" />

  Y en style.css ajustá .polaroid-foto para que muestre la imagen:
  .polaroid-foto img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
-->

<!-- Ejemplo visual estático (no se usa en producción) -->
<div class="polaroid" style="--rot: -3deg">
  <div class="polaroid-foto">🌅</div>
  <p class="polaroid-nota">Nuestro primer amanecer</p>
  <p class="polaroid-fecha">Marzo, 1899</p>
</div>
