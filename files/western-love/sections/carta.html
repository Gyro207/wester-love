<section id="carta" class="section-carta">
  <div class="carta-wrapper">

    <!-- Animación de sobre abriéndose -->
    <div class="sobre-animacion" id="sobre-animacion" aria-hidden="true">
      <div class="sobre-base"></div>
      <div class="sobre-flap"></div>
      <div class="sobre-sello">✦</div>
    </div>

    <!-- La carta desplegada -->
    <div class="carta-paper" id="carta-paper">
      <div class="carta-header">
        <span class="carta-lugar" id="carta-lugar"></span>
        <span class="carta-fecha-display" id="carta-fecha-display"></span>
      </div>
      <div class="carta-saludo" id="carta-saludo"></div>
      <div class="carta-cuerpo" id="carta-cuerpo"></div>
      <div class="carta-firma">
        <span class="carta-cierre">Con todo lo que soy,</span>
        <span class="carta-nombre" id="carta-nombre-firma"></span>
      </div>
      <div class="carta-decoracion" aria-hidden="true">✦</div>
    </div>

  </div>

  <!-- Botón para continuar -->
  <button class="btn-continuar scroll-reveal" data-target="mapa">
    Explorar Nuestro Camino ↓
  </button>
</section>
