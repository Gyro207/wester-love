<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Una Carta Perdida en el Tiempo</title>

  <!-- Estilos -->
  <link rel="stylesheet" href="assets/variables.css" />
  <link rel="stylesheet" href="assets/animations.css" />
  <link rel="stylesheet" href="assets/style.css" />

  <!-- Fuentes de Google -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Rye&family=Crimson+Text:ital,wght@0,400;0,600;1,400;1,600&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ═══════════════════════════════════════
       LOADER — pantalla de carga inicial
  ════════════════════════════════════════ -->
  <div id="loader" class="loader">
    <div class="loader-inner">
      <div class="loader-sello">✦</div>
      <p class="loader-texto">Abriendo el baúl...</p>
    </div>
  </div>

  <!-- ═══════════════════════════════════════
       NAVBAR — botón flotante de navegación
  ════════════════════════════════════════ -->
  <div id="slot-navbar"></div>

  <!-- ═══════════════════════════════════════
       SECCIONES — se inyectan desde JS
  ════════════════════════════════════════ -->

  <!-- Sección 1: Intro -->
  <div id="slot-intro"></div>

  <!-- Contenido principal (oculto hasta abrir la carta) -->
  <div id="main-content" class="hidden">

    <!-- Sección 2: Carta principal -->
    <div id="slot-carta"></div>

    <!-- Sección 3: Mapa de recuerdos -->
    <div id="slot-mapa"></div>

    <!-- Sección 4: Álbum polaroid -->
    <div id="slot-album"></div>

    <!-- Sección 5: Cartas secretas -->
    <div id="slot-sobres"></div>

    <!-- Sección 6: Contador del tiempo -->
    <div id="slot-contador"></div>

    <!-- Sección 7: Libro de recuerdos -->
    <div id="slot-libro"></div>

    <!-- Sección 8: Mensajes ocultos -->
    <div id="slot-ocultos"></div>

    <!-- Sección 9: Fogata final -->
    <div id="slot-fogata"></div>

  </div><!-- fin #main-content -->

  <!-- ═══════════════════════════════════════
       MODAL y MENSAJE FLOTANTE
  ════════════════════════════════════════ -->
  <div id="slot-modal"></div>
  <div class="mensaje-flotante" id="mensaje-flotante" aria-live="polite"></div>

  <!-- ═══════════════════════════════════════
       SCRIPTS — orden importa
  ════════════════════════════════════════ -->
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/particles.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/sections.js"></script>
  <script src="js/contador.js"></script>
  <script src="js/libro.js"></script>
  <script src="js/sounds.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
