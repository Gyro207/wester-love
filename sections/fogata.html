<section id="fogata" class="section-fogata">

  <!-- Cielo nocturno con estrellas -->
  <div class="cielo-nocturno" aria-hidden="true">
    <div class="estrellas" id="estrellas"></div>
    <div class="luna"></div>
  </div>

  <!-- Fogata animada -->
  <div class="fogata-escena" aria-hidden="true">
    <div class="fogata">
      <div class="llama l1"></div>
      <div class="llama l2"></div>
      <div class="llama l3"></div>
      <div class="brasa"></div>
    </div>
    <div class="troncos"></div>
    <div class="humo" id="humo-container"></div>
  </div>

  <!-- Mensaje final -->
  <div class="mensaje-final">
    <div class="mensaje-final-papel">
      <p class="mensaje-final-cita" id="mensaje-final-cita"></p>
      <div class="mensaje-final-firmas">
        <span id="firma-ella"></span>
        <span class="amp">&amp;</span>
        <span id="firma-el"></span>
      </div>
      <div class="mensaje-corazon" aria-hidden="true">♥</div>
    </div>
  </div>

  <!-- Chispas volando -->
  <div id="chispas-container" aria-hidden="true"></div>

</section>
