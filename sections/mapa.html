<section id="mapa" class="section-mapa scroll-reveal">
  <div class="section-header">
    <h2 class="titulo-seccion">Nuestro Camino</h2>
    <p class="subtitulo-seccion">Los lugares que guardamos en el corazón</p>
  </div>

  <div class="mapa-container">
    <!-- Puntos y líneas se generan desde JS -->
    <div class="mapa-fondo" id="mapa-fondo"></div>

    <!-- Tooltip interactivo -->
    <div class="mapa-tooltip" id="mapa-tooltip" aria-live="polite">
      <div class="tooltip-foto" id="tooltip-foto"></div>
      <div class="tooltip-texto">
        <h3 class="tooltip-titulo"   id="tooltip-titulo"></h3>
        <p  class="tooltip-historia" id="tooltip-historia"></p>
      </div>
    </div>
  </div>

  <button class="btn-continuar scroll-reveal" data-target="album">
    Ver el Álbum ↓
  </button>
</section>
